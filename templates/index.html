<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <!-- Menggunakan CDN Tailwind CSS untuk styling modern -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Diabetes Prediction</h1>

        <!-- Menampilkan Hasil Prediksi -->
        {% if prediction %}
        <div class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mb-6 rounded" role="alert">
            <p class="font-bold">Hasil Prediksi:</p>
            <p class="text-xl">{{ prediction }}</p>
        </div>
        {% endif %}

        <form action="/predict" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Pilihan Model -->
            <div class="col-span-1 md:col-span-2 mb-4">
                <label class="block text-sm font-medium text-gray-700">Pilih Model</label>
                <select name="model" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    {% for name in model_names %}
                    <option value="{{ name }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Input Data -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Pregnancies</label>
                <input type="number" name="pregnancies" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Glucose</label>
                <input type="number" name="glucose" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Blood Pressure</label>
                <input type="number" name="blood_pressure" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Skin Thickness</label>
                <input type="number" name="skin_thickness" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Insulin</label>
                <input type="number" name="insulin" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">BMI</label>
                <input type="number" step="0.1" name="bmi" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Diabetes Pedigree Function</label>
                <input type="number" step="0.001" name="diabetes_pedigree_function" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Age</label>
                <input type="number" name="age" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
            </div>

            <button type="submit" class="col-span-1 md:col-span-2 mt-4 w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition">
                Predict
            </button>
        </form>
    </div>

</body>
</html>
